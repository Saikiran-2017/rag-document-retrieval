# Local / demo full stack: API + Next.js. Copy .env.example → `.env` and set OPENAI_API_KEY.
# Optional `.env.local` (gitignored) is merged when present so keys match local Python/Next dev.
#
#   docker compose up --build
#
# UI: http://localhost:3001  |  API: http://localhost:8000  |  Health: http://localhost:8000/health
#
# Browser calls the API via NEXT_PUBLIC_API_URL (must match how you open the site).

services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
      - path: .env.local
        required: false
    environment:
      KA_ENV: production
      # Ensure CORS allows the mapped web port (3001->3000).
      KA_WEB_PORT: "3001"
      PYTHONPATH: /app
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
        NEXT_PUBLIC_E2E_NO_STREAM: "1"
    ports:
      - "3001:3000"
    depends_on:
      api:
        condition: service_healthy
    environment:
      NODE_ENV: production
